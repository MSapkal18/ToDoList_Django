<!DOCTYPE html>
<html>

<head>
    <title>To-Do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
        rel="stylesheet" />
    <style>
        .todo-container {
            max-width: 520px;
            margin: 0 auto;
            padding-top: 12vh;

        }

        .input-add {
            border: 1px solid var(--border-color, #ccc);
            background: var(--card-bg, #fff);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: green;
            transition: box-shadow 0.2s;
        }

        .btn-add {
            background-color: green;
            border: none;
            color: #fff;
            border-radius: 0.5rem;
            padding: 0 12px;
        }

        .btn-add:hover {
            background-color: #0b5ed7;
        }

        .summary {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Task List Item */
        .list-group-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            transition: background-color 0.2s;
            border-radius: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .list-group-item:hover {
            background-color: #e7e8e9;
            /* subtle hover effect */
        }

        /* Left side: checkbox + title + date */
        .task-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            /* spacing between checkbox and text */
        }

        /* Smooth line-through animation */
        .task-info span {
            transition: all 0.3s ease;
        }

    </style>

</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="mb-4 text-center">
            <h1 class="text-primary">My To-Do List</h1>

        </div>

        <div class="todo-container card shadow-lg p-3 rounded-4">
            {% if totalTask %}
            <p class="summary">{{totalTask}} tasks remaining.</p>
            {% else %}
            <p class="summary">No tasks yet. Add one below.</p>
            {% endif %}
            <form action="addTask" method="post" class="d-flex gap-2 mb-4">
                {% csrf_token %}
                <input type="text" name="title" class="input-add flex-grow-1" placeholder="What needs to be done?" />
                <button type="submit" class="btn-add">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </form>

            <div>
                <!-- Task list -->
                <ul class="list-group">
                    {% for task in tasks %}
                    <li class="list-group-item">
                        <div class="task-info">
                            <input type="checkbox"
                                onclick="location.href='{% url 'completeTask' task.id %}'" {% if task.completed %}
                                checked {% endif %} />
                            <span {% if task.completed %} style="text-decoration: line-through;" {% endif %}>
                                {{ task.title }}
                            </span>
                            <small class="text-muted">({{ task.created|date:"M d, Y" }})</small>
                        </div>
                        <a href="{% url 'deleteTask' task.id %}" class="btn btn-sm btn-danger">
                            <i class="bi bi-trash"></i>
                        </a>
                    </li>

                    {% empty %}
                    <li class="list-group-item text-center text-muted">No tasks added yet.</li>
                    {% endfor %}
                </ul>
            </div>
            <div class="container mt-5">

            </div>
        </div>
        
    </div>

</body>

</html>
